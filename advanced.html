<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" 
            integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    </head>
    <body>
        <form action="https://www.google.com/advanced_search" method="get">
            <div> Advanced Search </div>
            <hr />
            <div>Find Pages with...</div>
            <label for="with_words">All these words: </label> <br>
            <input type="text" value="as_q" id="with_words">
            <label for="exact">this exact word or phrase:</label> <br>
            <input type="text" value="as_epq" id="exact">
        </form>
    </body>
</html>
